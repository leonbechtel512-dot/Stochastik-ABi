    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

    0% { transform: translateY(40px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

    0%, 100% { transform: rotateY(0deg); }
    50% { transform: rotateY(180deg); }
  }

    0% { transform: rotate(0) scale(1); }

const formatText = (text) => {
  if (!text) return null;
  // Replace **bold** with span
  const parts = text.split(/(\*\*.*?\*\*)/g);
  return parts.map((p, i) => {
    if (p.startsWith("**") && p.endsWith("**")) {
      return <span key={i} className="keyword">{p.slice(2, -2)}</span>;
    }
    return <span key={i}>{p}</span>;
  });
};

const Confetti = () => {
  const pieces = useMemo(() => Array.from({ length: 40 }, (_, i) => ({
    id: i, left: Math.random() * 100,
    color: ["#ffd23f", "#ff3b8c", "#1de9ff", "#6affb6", "#a05bff"][i % 5],
    delay: Math.random() * 0.5,
    size: 6 + Math.random() * 10
  })), []);
  return (
    <>
      {pieces.map(p => (
        <div key={p.id} className="confetti" style={{
          left: `${p.left}%`, top: 0,
          background: p.color, width: p.size, height: p.size,
          animationDelay: `${p.delay}s`,
          borderRadius: Math.random() > 0.5 ? "50%" : "0"
        }} />
      ))}
    </>
  );
};

function App() {
  const [lang, setLang] = useState("de");
  const t = useCallback((k) => translations[lang][k] || k, [lang]);

  const [view, setView] = useState("welcome"); // welcome, map, level, certificate
  const [profile, setProfile] = useState({ name: "", avatar: AVATARS[0], color: COLORS[0].hex, mode: "solo" });
  const [xp, setXp] = useState(0);
  const [unlocked, setUnlocked] = useState([1]);
  const [completed, setCompleted] = useState([]);
  const [currentLevel, setCurrentLevel] = useState(null);
  const [stats, setStats] = useState({ correct: 0, wrong: 0, history: [] }); // history: {levelId, levelTitle, correctCount, totalCount, wrongQuestions:[]}
  const [showTeacher, setShowTeacher] = useState(false);
  const [showSunPwd, setShowSunPwd] = useState(false);
  const [teacherActive, setTeacherActive] = useState(false);

  const levels = useMemo(() => buildLevels(), []);

  // Restore from sessionStorage if present (in-memory only since artifacts disallow localStorage)
  // We avoid storage APIs altogether per artifact rules.

  const unlockLevel = (id) => {
    setUnlocked(prev => prev.includes(id) ? prev : [...prev, id]);
  };

  const handleLevelComplete = (levelId, correctCount, totalCount, wrongQuestions) => {
    const gained = correctCount * 50;
    setXp(prev => prev + gained);
    if (!completed.includes(levelId)) {
      setCompleted(prev => [...prev, levelId]);
    }
    const next = levels.find(l => l.id === levelId + 1);
    if (next) unlockLevel(next.id);
    const lvl = levels.find(l => l.id === levelId);
    setStats(prev => ({
      correct: prev.correct + correctCount,
      wrong: prev.wrong + (totalCount - correctCount),
      history: [...prev.history.filter(h => h.levelId !== levelId), {
        levelId, levelTitle: lvl ? lvl.title : "", correctCount, totalCount, wrongQuestions
      }]
    }));
  };

  const allLevelsDone = completed.length === levels.length;

  /* ====== UNLOCK ALL via sun-button password ====== */
  const handleSunPassword = (pw) => {
    if (pw.toLowerCase() === "zufall") {
      setUnlocked(levels.map(l => l.id));
      setShowSunPwd(false);
      setTeacherActive(true);
      alert("✨ Alle Welten und Level wurden freigeschaltet! ✨");
    } else {
      alert(t("invalidPassword"));
    }
  };
  const handleTeacherPassword = (pw) => {
    if (pw === "lehrer2026" || pw.toLowerCase() === "zufall") {
      setTeacherActive(true);
      setUnlocked(levels.map(l => l.id));
      setShowTeacher(false);
      alert("👨‍🏫 " + t("teacherUnlocked"));
    } else {
      alert(t("invalidPassword"));
    }
  };

  /* ====== HEADER ====== */
  const Header = () => (
    <header className="sticky top-0 z-30 bg-gradient-to-r from-[#1a2148] via-[#0b1023] to-[#1a2148] border-b-4 border-[#ffd23f] shadow-lg">
      <div className="max-w-5xl mx-auto px-3 py-2 flex items-center justify-between gap-2">
        <button
          onClick={() => view !== "welcome" && setView("map")}
          className="flex items-center gap-2 group"

              <div className="flex gap-2">

  /* ====== WELCOME / SETUP ====== */
  const WelcomeView = () => {
    const [name, setName] = useState("");
    const [step, setStep] = useState(0);
    const [mode, setMode] = useState("solo");
    const [avatar, setAvatar] = useState(AVATARS[0]);
    const [color, setColor] = useState(COLORS[0].hex);

    const randomNick = () => setName(NICKS[Math.floor(Math.random() * NICKS.length)]);

              <div className="text-center mb-6">

              <input
                type="text" value={name} onChange={(e)=>setName(e.target.value)}
                placeholder={t("yourName")}
                className="w-full px-4 py-3 bg-[#0b1023] border-2 border-[#ffd23f] rounded-xl text-white text-lg mb-3"
              />
              <button onClick={randomNick} className="w-full btn-3d bg-[#1de9ff] text-[#0b1023] py-2 rounded-xl font-bold mb-4">
                {t("randomNick")}
              </button>
              <h3 className="text-white font-bold mb-2">{t("chooseMode")}:</h3>
              <div className="grid grid-cols-2 gap-2 mb-4">
                {[{v:"solo", k:"soloMode"}, {v:"team", k:"teamMode"}].map(m => (
                  <button key={m.v} onClick={()=>setMode(m.v)}
                    className={`btn-3d py-3 rounded-xl font-bold ${mode===m.v ? "bg-[#ffd23f] text-[#0b1023]" : "bg-[#1a2148] text-white border border-[#ffd23f]/30"}`}>
                    {t(m.k)}
                  </button>
                ))}
              </div>
              <div className="flex gap-2">
                <button onClick={()=>setStep(0)} className="btn-3d bg-[#1a2148] text-white py-3 px-4 rounded-xl">←</button>
                <button onClick={()=>name.trim() && setStep(2)} disabled={!name.trim()}
                  className="flex-1 btn-3d bg-[#ffd23f] text-[#0b1023] py-3 rounded-xl pixel text-xs disabled:opacity-40">
                  {t("next")} ▶
                </button>
              </div>
            </>
          )}
          {step === 2 && (
            <>
              <h2 className="pixel text-sm text-[#ffd23f] mb-4">{t("chooseAvatar")}</h2>
              <div className="grid grid-cols-6 gap-2 mb-4">
                {AVATARS.map(a => (
                  <button key={a} onClick={()=>setAvatar(a)}
                    className={`text-3xl p-2 rounded-xl btn-3d ${avatar===a ? "bg-[#ffd23f] scale-110" : "bg-[#1a2148] border border-[#ffd23f]/30"}`}>
                    {a}
                  </button>
                ))}
              </div>
              <h3 className="pixel text-xs text-[#ffd23f] mb-3">{t("chooseColor")}</h3>
              <div className="flex flex-wrap gap-2 mb-6 justify-center">
                {COLORS.map(c => (
                  <button key={c.name} onClick={()=>setColor(c.hex)}
                    className={`w-10 h-10 rounded-full btn-3d ${color===c.hex ? "ring-4 ring-white scale-110" : ""}`}
                    style={{background: c.hex}} />
                ))}
              </div>
              <div className="text-center mb-4 p-4 bg-[#0b1023]/50 rounded-xl">
                <span className="text-5xl block mb-1" style={{color}}>{avatar}</span>
                <span className="text-white font-bold">{name}</span>
              </div>
              <div className="flex gap-2">
                <button onClick={()=>setStep(1)} className="btn-3d bg-[#1a2148] text-white py-3 px-4 rounded-xl">←</button>
                <button onClick={startQuest}
                  className="flex-1 btn-3d glow bg-gradient-to-r from-[#ffd23f] to-[#ff3b8c] text-[#0b1023] py-3 rounded-xl pixel text-xs">
                  {t("startQuest")} ⚔️
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  };

  /* ====== MAP / LEVEL OVERVIEW ====== */
  const MapView = () => {
    const worldsMap = {};
    levels.forEach(l => {
      if (!worldsMap[l.world]) worldsMap[l.world] = { title: l.worldTitle, levels: [] };
      worldsMap[l.world].levels.push(l);
    });
    const worldKeys = Object.keys(worldsMap);

    return (
      <div className="min-h-screen p-3 sm:p-6 max-w-5xl mx-auto pb-24">
        <div className="text-center mb-4 pop-in">
          <div className="text-5xl float">🗺️</div>
          <h1 className="pixel text-base sm:text-xl text-[#ffd23f]">{t("appTitle")}</h1>
          <p className="text-white/70 text-sm">Welt {completed.length}/{levels.length} {t("completed")}</p>
        </div>

        {worldKeys.map((wk, wi) => {
          const world = worldsMap[wk];
          return (
            <div key={wk} className="mb-8 slide-up">
              <div className="card-glass rounded-2xl p-3 mb-3 border-l-8" style={{borderColor: world.levels[0].color}}>
                <h2 className="pixel text-xs sm:text-sm text-white">
                  Welt {wk}: <span style={{color: world.levels[0].color}}>{world.title}</span>
                </h2>
              </div>
              <div className="relative">
                <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none" viewBox="0 0 100 100">
                  <path d="M 5 50 Q 25 20, 50 50 T 95 50" stroke={world.levels[0].color} strokeWidth="0.5" fill="none" className="map-path" opacity="0.4" />
                </svg>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 relative">
                  {world.levels.map((lv, idx) => {
                    const isUnlocked = unlocked.includes(lv.id);
                    const isCompleted = completed.includes(lv.id);
                    const isAvatarHere = (() => {
                      // Avatar is on the most recent unlocked but not completed level
                      const last = [...unlocked].sort((a,b)=>b-a).find(id => !completed.includes(id));
                      return lv.id === last;
                    })();
                    return (
                      <div key={lv.id} className="relative">
                        {isAvatarHere && (
                          <div className="avatar-marker absolute -top-8 left-1/2 -translate-x-1/2 z-10 text-4xl float" style={{color: profile.color}}>
                            {profile.avatar}
                          </div>
                        )}
                        <button
                          disabled={!isUnlocked}
                          onClick={() => { setCurrentLevel(lv); setView("level"); }}
                          className={`w-full aspect-square rounded-2xl p-3 btn-3d transition-all flex flex-col items-center justify-center text-center relative
                            ${isCompleted ? "bg-gradient-to-br from-[#6affb6] to-[#1de9ff]" :
                              isUnlocked ? "bg-gradient-to-br" : "bg-[#1a2148] opacity-50"}
                            ${lv.boss && isUnlocked ? "glow" : ""}`}
                          style={isUnlocked && !isCompleted ? {background: `linear-gradient(135deg, ${lv.color}, ${lv.color}aa)`} : {}}
                        >
                          {isCompleted && <span className="absolute top-1 right-1 text-xl">✓</span>}
                          {!isUnlocked && <span className="absolute top-1 right-1 text-base">🔒</span>}
                          {lv.boss && <span className="absolute top-1 left-1 text-xs pixel text-white bg-black/40 px-1 rounded">BOSS</span>}
                          <div className="text-3xl sm:text-4xl mb-1">{lv.icon}</div>
                          <div className="text-[10px] sm:text-xs font-bold text-[#0b1023] leading-tight">{lv.title}</div>
                          <div className="text-[9px] mt-1 opacity-70 text-[#0b1023]">Level {lv.id}</div>
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })}

        {allLevelsDone && (
          <div className="text-center mt-6 pop-in">
            <button
              onClick={()=>setView("certificate")}
              className="btn-3d glow bg-gradient-to-r from-[#ffd23f] to-[#ff3b8c] text-[#0b1023] py-4 px-6 rounded-xl pixel text-xs">
              🏆 {t("certificate")}
            </button>
          </div>
        )}
      </div>
    );
  };

  /* ====== LEVEL VIEW ====== */
  const LevelView = ({ level }) => {
    const [step, setStep] = useState(0);
    const [showFeedback, setShowFeedback] = useState(null);
    const [attempts, setAttempts] = useState(0);
    const [correctCount, setCorrectCount] = useState(0);
    const [wrongQuestions, setWrongQuestions] = useState([]);
    const [done, setDone] = useState(false);
    const [bossTimer, setBossTimer] = useState(level.timeLimit || null);
    const [bossStarted, setBossStarted] = useState(false);

    // Boss timer
    useEffect(() => {
      if (!level.boss || !bossStarted || done) return;
      if (bossTimer === null || bossTimer <= 0) return;
      const tm = setInterval(() => {
        setBossTimer(prev => {
          if (prev <= 1) {
            setDone(true);
            return 0;
          }
          return prev - 1;
        });
      }, 1000);
      return () => clearInterval(tm);
    }, [bossStarted, bossTimer, done, level.boss]);

    const card = level.cards[step];
    const totalQuestions = level.cards.filter(c => c.type !== "info" && c.type !== "worksheet").length;

    const goNext = () => {
      setShowFeedback(null);
      setAttempts(0);
      if (step < level.cards.length - 1) setStep(step + 1);
      else {
        setDone(true);
        handleLevelComplete(level.id, correctCount, totalQuestions, wrongQuestions);
      }
    };

    const handleAnswer = (isCorrect, currentCard, userAnswer = "") => {
      setAttempts(a => a + 1);
      if (isCorrect) {
        setCorrectCount(c => c + 1);
        setShowFeedback({ correct: true, msg: t("correct"), explanation: currentCard.explanation });
      } else {
        if (!wrongQuestions.find(w => w.q === currentCard.question)) {
          setWrongQuestions(wq => [...wq, {q: currentCard.question, given: userAnswer, correct: getCorrectDisplay(currentCard)}]);
        }
        let hint = currentCard.hint || "";
        if (attempts >= 1 && currentCard.explanation) hint = currentCard.explanation;
        setShowFeedback({ correct: false, msg: t("incorrect"), hint });
      }
    };

    const getCorrectDisplay = (c) => {
      if (c.type === "single") return c.options[c.correct];
      if (c.type === "multi") return c.correct.map(i => c.options[i]).join(", ");
      if (c.type === "input") return Array.isArray(c.correct) ? c.correct[0] : c.correct;
      if (c.type === "match") return c.pairs.map(p => `${p.left} → ${p.right}`).join("; ");
      if (c.type === "sort") return c.correct.join(" → ");
      if (c.type === "fillblank") return c.correct.join(", ");
      return "";
    };

    if (level.boss && !bossStarted && !done) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="max-w-md w-full card-glass rounded-3xl p-6 text-center pop-in border-4 border-[#ffd23f] glow">
            <div className="text-7xl mb-4 wobble">👑</div>
            <h1 className="pixel text-base text-[#ff3b8c] mb-2">{t("boss")}</h1>
            <h2 className="text-white text-xl font-bold mb-3">{t("bossIntro")}</h2>
            <p className="text-white/80 mb-4">{t("bossDescription")}</p>
            <div className="bg-[#0b1023] rounded-xl p-3 mb-4">
              <span className="pixel text-xs text-[#ffd23f]">⏱ {Math.floor(level.timeLimit/60)}:00</span>
            </div>
            <button onClick={()=>setBossStarted(true)} className="w-full btn-3d glow bg-gradient-to-r from-[#ff3b8c] to-[#ffd23f] text-[#0b1023] py-3 rounded-xl pixel text-xs mb-2">
              {t("startBoss")} ⚔️
            </button>
            <button onClick={()=>setView("map")} className="w-full btn-3d bg-[#1a2148] text-white py-2 rounded-xl">
              ← {t("backToMap")}
            </button>
          </div>
        </div>
      );
    }

    if (done) {
      const pct = totalQuestions > 0 ? Math.round((correctCount / totalQuestions) * 100) : 100;
      const perfect = correctCount === totalQuestions && totalQuestions > 0;
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          {perfect && <Confetti />}
          <div className="max-w-md w-full card-glass rounded-3xl p-6 text-center pop-in border-4" style={{borderColor: level.color}}>
            <div className="text-7xl mb-3">{perfect ? "🌟" : "✓"}</div>
            <h1 className="pixel text-sm text-[#ffd23f] mb-2">{t("levelComplete")}</h1>
            {perfect && <p className="text-[#6affb6] font-bold mb-2">{t("perfectLevel")}</p>}
            <p className="text-white text-2xl font-bold mb-1">{correctCount} / {totalQuestions}</p>
            <p className="text-white/70 mb-4">{pct}%</p>
            <div className="bg-[#0b1023] rounded-xl p-3 mb-4">
              <p className="pixel text-[10px] text-[#ffd23f]">+{correctCount * 50} XP</p>
            </div>
            <button onClick={()=>setView("map")} className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-3 rounded-xl pixel text-xs">
              {t("backToMap")}
            </button>
          </div>
        </div>
      );
    }

    return (
      <div className="min-h-screen p-3 sm:p-6 max-w-3xl mx-auto pb-32">
        {/* Progress bar */}
        <div className="mb-4 sticky top-16 bg-[#0b1023]/95 z-20 py-2 backdrop-blur">
          <div className="flex items-center justify-between mb-2">
            <button onClick={()=>setView("map")} className="text-white/70 hover:text-white text-sm">← {t("backToMap")}</button>
            {level.boss && bossTimer !== null && (
              <span className={`pixel text-xs px-3 py-1 rounded ${bossTimer < 30 ? "bg-red-500 text-white shake" : "bg-[#ffd23f] text-[#0b1023]"}`}>
                ⏱ {Math.floor(bossTimer/60)}:{String(bossTimer%60).padStart(2,'0')}
              </span>
            )}
            <span className="text-xs text-white/70">{step+1} / {level.cards.length}</span>
          </div>
          <div className="h-2 bg-[#1a2148] rounded-full overflow-hidden">
            <div className="h-full transition-all rounded-full" style={{
              width: `${((step+1)/level.cards.length)*100}%`,
              background: `linear-gradient(to right, ${level.color}, #ff3b8c)`
            }} />
          </div>
        </div>

        <div className="card-glass rounded-2xl p-4 sm:p-6 mb-4 slide-up" style={{borderColor: level.color, borderWidth: "3px"}}>
          <div className="flex items-center gap-3 mb-3">
            <span className="text-4xl">{level.icon}</span>
            <div>
              <p className="text-xs text-white/60">Welt {level.world} · Level {level.id}</p>
              <h2 className="text-white font-bold text-lg leading-tight" style={{color: level.color}}>{level.title}</h2>
            </div>
          </div>

          <CardRenderer
            card={card}
            onAnswer={handleAnswer}
            onNext={goNext}
            showFeedback={showFeedback}
            t={t}
            teacherActive={teacherActive}
          />
        </div>

        {showFeedback && (
          <div className={`card-glass rounded-2xl p-4 mb-4 border-l-8 slide-up ${showFeedback.correct ? "border-[#6affb6]" : "border-[#ff3b8c]"}`}>
            <p className={`pixel text-xs mb-2 ${showFeedback.correct ? "text-[#6affb6]" : "text-[#ff3b8c]"}`}>
              {showFeedback.correct ? "✓ " + showFeedback.msg : "✗ " + showFeedback.msg}
            </p>
            {showFeedback.explanation && (
              <p className="text-white/90 text-sm">{formatText(showFeedback.explanation)}</p>
            )}
            {showFeedback.hint && !showFeedback.correct && (
              <p className="text-[#ffd23f] text-sm mt-1">💡 {formatText(showFeedback.hint)}</p>
            )}
          </div>
        )}

        <div className="flex gap-2">
          {teacherActive && card.type !== "info" && card.type !== "worksheet" && (
            <>
              <button onClick={()=>{
                setShowFeedback({correct: false, msg: t("solution"), explanation: getCorrectDisplay(card) + ". " + (card.explanation || "")});
              }} className="btn-3d bg-[#a05bff] text-white px-3 py-2 rounded text-xs">👁 {t("showSolution")}</button>
              <button onClick={goNext} className="btn-3d bg-[#a05bff] text-white px-3 py-2 rounded text-xs">⏭ {t("skipTask")}</button>
            </>
          )}
          {(showFeedback?.correct || card.type === "info" || card.type === "worksheet" || teacherActive) && (
            <button onClick={goNext} className="flex-1 btn-3d bg-[#ffd23f] text-[#0b1023] py-3 rounded-xl pixel text-xs">
              {t("continue")} →
            </button>
          )}
        </div>
      </div>
    );
  };

  /* ====== CARD RENDERER (Tasks) ====== */
  const CardRenderer = ({ card, onAnswer, onNext, showFeedback, t, teacherActive }) => {
    if (card.type === "info") return <InfoCard card={card} />;
    if (card.type === "worksheet") return <WorksheetCard card={card} onNext={onNext} t={t} teacherActive={teacherActive} />;
    if (card.type === "single") return <SingleChoice card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    if (card.type === "multi") return <MultiChoice card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    if (card.type === "input") return <InputAnswer card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    if (card.type === "match") return <MatchPairs card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    if (card.type === "sort") return <SortItems card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    if (card.type === "fillblank") return <FillBlank card={card} onAnswer={onAnswer} disabled={!!showFeedback?.correct} t={t} />;
    return null;
  };

  const InfoCard = ({ card }) => (
    <div className="text-center">
      <h3 className="pixel text-xs sm:text-sm text-[#ffd23f] mb-3">{card.title}</h3>
      <div className="text-white/90 leading-relaxed text-base sm:text-lg whitespace-pre-line">
        {formatText(card.text)}
      </div>
    </div>
  );

  const WorksheetCard = ({ card, onNext, t, teacherActive }) => {
    const [secs, setSecs] = useState(15);
    useEffect(() => {
      if (teacherActive) { setSecs(0); return; }
      const tm = setInterval(() => setSecs(s => Math.max(0, s-1)), 1000);
      return () => clearInterval(tm);
    }, [teacherActive]);
    return (
      <div className="text-center">
        <div className="text-5xl mb-3 float">📝</div>
        <h3 className="pixel text-xs text-[#ffd23f] mb-3">{t("completeWorksheet")}</h3>
        <p className="text-white/90 mb-4 leading-relaxed">{card.text}</p>
        <div className="bg-[#0b1023] rounded-xl p-4 inline-block">
          {secs > 0 ? (
            <>
              <p className="text-white/70 text-sm">{t("waitTime")}</p>
              <p className="pixel text-2xl text-[#ffd23f]">{secs}</p>
              <p className="text-white/50 text-xs">{t("seconds")}</p>
            </>
          ) : (
            <p className="pixel text-xs text-[#6affb6]">✓ {t("continue")}</p>
          )}
        </div>
      </div>
    );
  };

  const SingleChoice = ({ card, onAnswer, disabled, t }) => {
    const [selected, setSelected] = useState(null);
    return (
      <div>
        <h3 className="text-white text-lg mb-4 leading-snug">{formatText(card.question)}</h3>
        <div className="space-y-2">
          {card.options.map((opt, i) => (
            <button key={i}
              disabled={disabled}
              onClick={() => { setSelected(i); onAnswer(i === card.correct, card, opt); }}
              className={`w-full text-left p-3 rounded-xl btn-3d border-2 transition-all
                ${selected === i ? (i === card.correct ? "bg-[#6affb6] text-[#0b1023] border-[#6affb6]" : "bg-[#ff3b8c] text-white border-[#ff3b8c] shake") : "bg-[#0b1023] text-white border-[#ffd23f]/30 hover:border-[#ffd23f]"}`}>
              <span className="pixel text-[10px] mr-2 opacity-60">[{String.fromCharCode(65+i)}]</span>
              {opt}
            </button>
          ))}
        </div>
      </div>
    );
  };

  const MultiChoice = ({ card, onAnswer, disabled, t }) => {
    const [selected, setSelected] = useState([]);
    const [submitted, setSubmitted] = useState(false);
    const toggle = (i) => {
      if (submitted) return;
      setSelected(s => s.includes(i) ? s.filter(x=>x!==i) : [...s, i]);
    };
    const check = () => {
      const sortedSel = [...selected].sort();
      const sortedCor = [...card.correct].sort();
      const correct = JSON.stringify(sortedSel) === JSON.stringify(sortedCor);
      setSubmitted(true);
      onAnswer(correct, card, selected.map(i => card.options[i]).join(", "));
    };
    return (
      <div>
        <h3 className="text-white text-lg mb-2">{formatText(card.question)}</h3>
        <p className="text-white/60 text-xs mb-3">{t("selectAll")}</p>
        <div className="space-y-2 mb-3">
          {card.options.map((opt, i) => (
            <button key={i} onClick={()=>toggle(i)} disabled={submitted && disabled}
              className={`w-full text-left p-3 rounded-xl btn-3d border-2 transition-all
                ${submitted && card.correct.includes(i) ? "bg-[#6affb6] text-[#0b1023] border-[#6affb6]" :
                  submitted && selected.includes(i) ? "bg-[#ff3b8c] text-white border-[#ff3b8c]" :
                  selected.includes(i) ? "bg-[#ffd23f] text-[#0b1023] border-[#ffd23f]" : "bg-[#0b1023] text-white border-[#ffd23f]/30"}`}>
              <span className="mr-2">{selected.includes(i) ? "☑" : "☐"}</span>
              {opt}
            </button>
          ))}
        </div>
        {!submitted && (
          <button onClick={check} disabled={selected.length===0}
            className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-2 rounded-xl pixel text-xs disabled:opacity-40">
            {t("submit")}
          </button>
        )}
      </div>
    );
  };

  const InputAnswer = ({ card, onAnswer, disabled, t }) => {
    const [val, setVal] = useState("");
    const [submitted, setSubmitted] = useState(false);
    const check = () => {
      const v = val.trim().toLowerCase().replace(/\s/g, "");
      const corrects = (Array.isArray(card.correct) ? card.correct : [card.correct]).map(c => String(c).toLowerCase().replace(/\s/g, ""));
      const ok = corrects.includes(v);
      setSubmitted(true);
      onAnswer(ok, card, val);
    };
    return (
      <div>
        <h3 className="text-white text-lg mb-3">{formatText(card.question)}</h3>
        <input type="text" value={val} onChange={(e)=>setVal(e.target.value)}
          disabled={submitted && disabled}
          onKeyDown={(e)=>e.key==="Enter" && val.trim() && check()}
          placeholder={t("yourAnswer")}
          className="w-full px-4 py-3 bg-[#0b1023] border-2 border-[#ffd23f] rounded-xl text-white text-lg mb-3" />
        {!submitted && (
          <button onClick={check} disabled={!val.trim()}
            className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-2 rounded-xl pixel text-xs disabled:opacity-40">
            {t("submit")}
          </button>
        )}
      </div>
    );
  };

  /* MATCHING (drag-free, button based) */
  const MatchPairs = ({ card, onAnswer, disabled, t }) => {
    const [pairs] = useState(card.pairs);
    const [shuffledRights] = useState(() => [...card.pairs.map(p=>p.right)].sort(()=>Math.random()-0.5));
    const [assignments, setAssignments] = useState({}); // leftIndex -> rightValue
    const [selectedRight, setSelectedRight] = useState(null);
    const [submitted, setSubmitted] = useState(false);

    const assign = (leftIdx) => {
      if (submitted) return;
      if (selectedRight === null) return;
      // remove this right from any other slot
      const newA = {...assignments};
      Object.keys(newA).forEach(k => { if (newA[k] === selectedRight) delete newA[k]; });
      newA[leftIdx] = selectedRight;
      setAssignments(newA);
      setSelectedRight(null);
    };
    const check = () => {
      const ok = pairs.every((p, i) => assignments[i] === p.right);
      setSubmitted(true);
      onAnswer(ok, card, Object.entries(assignments).map(([i,v])=>`${pairs[i].left}=${v}`).join(", "));
    };
    const usedRights = Object.values(assignments);
    return (
      <div>
        <h3 className="text-white text-lg mb-3">{card.question}</h3>
        <p className="text-white/60 text-xs mb-3">{t("drag")}</p>
        <div className="space-y-2 mb-3">
          {pairs.map((p, i) => (
            <div key={i} className="flex gap-2 items-center">
              <div className="bg-[#1a2148] border-2 border-[#1de9ff] text-[#1de9ff] px-3 py-2 rounded-xl flex-1 font-bold text-sm">
                {p.left}
              </div>
              <span className="text-white">→</span>
              <button onClick={()=>assign(i)} disabled={submitted}
                className={`flex-1 px-3 py-2 rounded-xl border-2 text-left text-sm
                  ${assignments[i] ? (submitted && assignments[i]!==p.right ? "bg-[#ff3b8c] border-[#ff3b8c] text-white" :
                    submitted ? "bg-[#6affb6] border-[#6affb6] text-[#0b1023]" : "bg-[#ffd23f] border-[#ffd23f] text-[#0b1023]")
                  : "bg-[#0b1023] border-dashed border-[#ffd23f]/40 text-white/50"}`}>
                {assignments[i] || "___"}
              </button>
            </div>
          ))}
        </div>
        <p className="text-white/70 text-xs mb-2">Klicke einen Begriff, dann das passende Feld:</p>
        <div className="flex flex-wrap gap-2 mb-3">
          {shuffledRights.filter(r => !usedRights.includes(r)).map((r, i) => (
            <button key={i} onClick={()=>setSelectedRight(r)} disabled={submitted}
              className={`px-3 py-2 rounded-xl border-2 text-sm btn-3d
                ${selectedRight===r ? "bg-[#ffd23f] border-[#ffd23f] text-[#0b1023]" : "bg-[#0b1023] border-[#ffd23f]/30 text-white"}`}>
              {r}
            </button>
          ))}
        </div>
        {!submitted && (
          <button onClick={check} disabled={Object.keys(assignments).length !== pairs.length}
            className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-2 rounded-xl pixel text-xs disabled:opacity-40">
            {t("submit")}
          </button>
        )}
      </div>
    );
  };

  /* SORT (Buttons up/down) */
  const SortItems = ({ card, onAnswer, disabled, t }) => {
    const [items, setItems] = useState(() => [...card.items].sort(()=>Math.random()-0.5));
    const [submitted, setSubmitted] = useState(false);
    const move = (i, dir) => {
      if (submitted) return;
      const j = i + dir;
      if (j<0 || j>=items.length) return;
      const arr = [...items];
      [arr[i], arr[j]] = [arr[j], arr[i]];
      setItems(arr);
    };
    const check = () => {
      const ok = JSON.stringify(items) === JSON.stringify(card.correct);
      setSubmitted(true);
      onAnswer(ok, card, items.join(" → "));
    };
    return (
      <div>
        <h3 className="text-white text-lg mb-3">{card.question}</h3>
        <p className="text-white/60 text-xs mb-3">{t("sort")}</p>
        <div className="space-y-2 mb-3">
          {items.map((it, i) => (
            <div key={it} className={`flex items-center gap-2 p-2 rounded-xl border-2
              ${submitted ? (it === card.correct[i] ? "bg-[#6affb6]/20 border-[#6affb6]" : "bg-[#ff3b8c]/20 border-[#ff3b8c]") : "bg-[#0b1023] border-[#ffd23f]/30"}`}>
              <span className="pixel text-[10px] text-[#ffd23f] w-6">{i+1}.</span>
              <span className="flex-1 text-white">{it}</span>
              <button onClick={()=>move(i,-1)} disabled={submitted || i===0} className="btn-3d bg-[#1a2148] text-white w-8 h-8 rounded disabled:opacity-30">↑</button>
              <button onClick={()=>move(i,1)} disabled={submitted || i===items.length-1} className="btn-3d bg-[#1a2148] text-white w-8 h-8 rounded disabled:opacity-30">↓</button>
            </div>
          ))}
        </div>
        {!submitted && (
          <button onClick={check} className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-2 rounded-xl pixel text-xs">{t("submit")}</button>
        )}
      </div>
    );
  };

  const FillBlank = ({ card, onAnswer, disabled, t }) => {
    const [val, setVal] = useState("");
    const [submitted, setSubmitted] = useState(false);
    const check = () => {
      const v = val.trim().toLowerCase();
      const ok = card.correct.map(c => String(c).toLowerCase()).includes(v);
      setSubmitted(true);
      onAnswer(ok, card, val);
    };
    const parts = card.template.split("___");
    return (
      <div>
        <h3 className="text-white text-lg mb-3">{card.question}</h3>
        <p className="text-white/60 text-xs mb-3">{t("fillBlank")}</p>
        <div className="bg-[#0b1023] p-4 rounded-xl mb-3 text-lg text-white text-center">
          {parts[0]}
          <input type="text" value={val} onChange={(e)=>setVal(e.target.value)}
            disabled={submitted && disabled}
            className={`inline-block w-20 px-2 py-1 mx-1 bg-[#1a2148] border-2 rounded text-center
              ${submitted ? (card.correct.map(c=>String(c).toLowerCase()).includes(val.trim().toLowerCase()) ? "border-[#6affb6] text-[#6affb6]" : "border-[#ff3b8c] text-[#ff3b8c]") : "border-[#ffd23f] text-[#ffd23f]"}`}
            onKeyDown={(e)=>e.key==="Enter" && val.trim() && check()} />
          {parts[1]}
        </div>
        {!submitted && (
          <button onClick={check} disabled={!val.trim()} className="w-full btn-3d bg-[#ffd23f] text-[#0b1023] py-2 rounded-xl pixel text-xs disabled:opacity-40">
            {t("submit")}
          </button>
        )}
      </div>
    );
  };

  /* ====== CERTIFICATE ====== */
  const CertificateView = () => {
    const certRef = useRef(null);
    const today = new Date().toLocaleDateString(lang === "de" ? "de-DE" : "en-GB");

    const downloadPDF = async () => {
      try {
        const el = certRef.current;
        if (!el) return;
        const canvas = await html2canvas(el, { scale: 2, backgroundColor: "#0b1023" });
        const imgData = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
        const w = pdf.internal.pageSize.getWidth();
        const h = pdf.internal.pageSize.getHeight();
        pdf.addImage(imgData, "PNG", 0, 0, w, h);

        // Add stats page
        pdf.addPage();
        pdf.setFontSize(20);
        pdf.text("Stochastik Quest – Ergebnisse", 20, 25);
        pdf.setFontSize(12);
        pdf.text(`Name: ${profile.name}`, 20, 40);
        pdf.text(`Datum: ${today}`, 20, 48);
        pdf.text(`Gesamt-XP: ${xp}`, 20, 56);
        pdf.text(`Richtige Antworten: ${stats.correct}`, 20, 64);
        pdf.text(`Falsche Antworten: ${stats.wrong}`, 20, 72);

        let y = 88;
        pdf.setFontSize(14);
        pdf.text("Level-Übersicht:", 20, y); y += 8;
        pdf.setFontSize(10);
        stats.history.forEach(h => {
          if (y > 190) { pdf.addPage(); y = 20; }
          pdf.text(`Level ${h.levelId} – ${h.levelTitle}: ${h.correctCount}/${h.totalCount}`, 20, y);
          y += 6;
          if (h.wrongQuestions && h.wrongQuestions.length) {
            h.wrongQuestions.forEach(wq => {
              if (y > 190) { pdf.addPage(); y = 20; }
              const text1 = `  ✗ Frage: ${wq.q.substring(0, 90)}`;
              const text2 = `     Richtig: ${String(wq.correct).substring(0, 90)}`;
              pdf.text(text1, 20, y); y += 5;
              pdf.text(text2, 20, y); y += 7;
            });
          }
        });

        pdf.save(`Stochastik_Zertifikat_${profile.name.replace(/\s/g,'_')}.pdf`);
      } catch (e) {
        console.error(e);
        alert("PDF-Export fehlgeschlagen: " + e.message);
      }
    };

    return (
      <div className="min-h-screen p-3 sm:p-6 max-w-4xl mx-auto pb-24">
        <Confetti />
        <div ref={certRef} className="bg-gradient-to-br from-[#1a2148] to-[#0b1023] rounded-3xl p-6 sm:p-10 border-8 border-[#ffd23f] relative overflow-hidden pop-in">
          <div className="absolute -top-4 -left-4 text-6xl opacity-20">🎲</div>
          <div className="absolute -bottom-4 -right-4 text-6xl opacity-20">🎲</div>
          <div className="absolute top-4 right-4 text-3xl">⭐</div>
          <div className="absolute top-4 left-4 text-3xl">⭐</div>
          <div className="text-center">
            <div className="text-7xl mb-3 wobble">🏆</div>
            <h1 className="pixel text-base sm:text-2xl text-[#ffd23f] mb-3">{t("certTitle")}</h1>
            <div className="border-t-2 border-b-2 border-[#ffd23f]/30 py-4 my-4">
              <p className="text-white/70 text-sm mb-1">{t("certDescription")}</p>
              <p className="retro text-3xl sm:text-5xl text-white mb-2" style={{color: profile.color}}>
                {profile.avatar} {profile.name}
              </p>
              <p className="text-white/70 text-sm italic">{t("certFor")}.</p>
            </div>
            <div className="grid grid-cols-3 gap-3 my-6">
              <div className="bg-[#0b1023]/60 rounded-xl p-3">
                <div className="text-2xl mb-1">⭐</div>
                <p className="pixel text-[10px] text-[#ffd23f]">{xp} XP</p>
              </div>
              <div className="bg-[#0b1023]/60 rounded-xl p-3">
                <div className="text-2xl mb-1">✓</div>
                <p className="pixel text-[10px] text-[#6affb6]">{stats.correct}</p>
              </div>
              <div className="bg-[#0b1023]/60 rounded-xl p-3">
                <div className="text-2xl mb-1">✗</div>
                <p className="pixel text-[10px] text-[#ff3b8c]">{stats.wrong}</p>
              </div>
            </div>
            <p className="text-white/60 text-xs">{today}</p>
            <p className="pixel text-[10px] text-[#1de9ff] mt-2">— Stochastik Quest —</p>
          </div>
        </div>

        <div className="mt-6 space-y-3">
          <button onClick={downloadPDF}
            className="w-full btn-3d glow bg-gradient-to-r from-[#ffd23f] to-[#ff3b8c] text-[#0b1023] py-4 rounded-xl pixel text-xs">
            {t("downloadPDF")}
          </button>
          <button onClick={()=>setView("map")}
            className="w-full btn-3d bg-[#1a2148] text-white py-3 rounded-xl border border-[#ffd23f]/30">
            ← {t("backToMap")}
          </button>
        </div>
      </div>
    );
  };

  /* ====== RENDER ROOT ====== */
  return (
    <div className="min-h-screen text-white">
      {view !== "welcome" && <Header />}
      {view === "welcome" && <WelcomeView />}
      {view === "map" && <MapView />}
      {view === "level" && currentLevel && <LevelView level={currentLevel} key={currentLevel.id} />}
      {view === "certificate" && <CertificateView />}
      <SunPasswordModal />
      <TeacherModal />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
